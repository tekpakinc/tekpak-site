<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Store</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --line:#e6e9f2;
      --text:#0f172a;
      --muted:#64748b;
      --accent:#2563eb;
      --accent2:#06b6d4;
      --shadow:0 14px 40px rgba(2,6,23,.10);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* Store-only wrapper (embed inside your own layout) */
    .store{
      max-width:1200px;
      margin:0 auto;
      padding:16px;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:end;
      padding:14px;
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .field{display:flex;flex-direction:column;gap:6px; min-width:180px}
    .field.wide{min-width:260px; flex:1}
    label{font-size:12px;color:var(--muted)}
    input, select{
      width:100%;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid #d7dbe7;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    input::placeholder{color:#94a3b8}
    input:focus, select:focus{
      border-color: rgba(37,99,235,.55);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    .btns{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
    button{
      border:0;
      border-radius: 12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      white-space:nowrap;
    }
    button.secondary{
      color: var(--text);
      background: #fff;
      border:1px solid #d7dbe7;
    }
    button:disabled{opacity:.6; cursor:not-allowed}

    .grid{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:12px;
    }
    @media (max-width:1100px){ .grid{grid-template-columns:repeat(3, minmax(0,1fr));} }
    @media (max-width:820px){ .grid{grid-template-columns:repeat(2, minmax(0,1fr));} }
    @media (max-width:520px){ .grid{grid-template-columns:1fr;} }

    .card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height: 340px;
    }

    .img{
      aspect-ratio: 4/3;
      background:#f1f5f9;
      border-bottom:1px solid var(--line);
      display:grid; place-items:center;
      overflow:hidden;
    }
    .img img{width:100%;height:100%;object-fit:cover}
    .ph{font-size:12px;color:#94a3b8}

    .bd{
      padding:12px 12px 14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }
    .title{font-weight:950;font-size:14px;line-height:1.15}
    .meta{font-size:12px;color:var(--muted);line-height:1.25}

    .priceRow{
      margin-top:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding-top:10px;
      border-top:1px solid var(--line);
    }
    .price{font-weight:1000; color:var(--text)}
    .buySlot{display:flex;gap:8px;align-items:center;flex-wrap:wrap; justify-content:flex-end}

    a.btnlink{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border-radius: 12px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      color:#fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      white-space:nowrap;
    }
    a.btnlink.secondary{
      color: var(--text);
      background: #fff;
      border:1px solid #d7dbe7;
    }

    /* PayPal snippet helpers */
    .ppwrap{display:flex; align-items:center; justify-content:flex-end}
    .ppwrap form{margin:0}
    .ppwrap input[type="image"]{max-width:170px; height:auto}
    .ppwrap button, .ppwrap input[type="submit"]{border-radius:12px}

    /* Minimal, non-invasive error message (only shows if load fails) */
    .errorBox{
      grid-column:1/-1;
      border:1px solid #fecaca;
      background:#fff1f2;
      color:#9f1239;
      border-radius: 12px;
      padding:12px;
      font-size:12px;
    }
  </style>
</head>

<body>
  <div class="store" id="storeRoot">
    <div class="toolbar">
      <div class="field wide">
        <label for="q">Search</label>
        <input id="q" placeholder="Model, manufacturer, category, item ID…" />
      </div>

      <div class="field">
        <label for="cat">Category</label>
        <select id="cat"><option value="">All</option></select>
      </div>

      <div class="field">
        <label for="mfg">Manufacturer</label>
        <select id="mfg"><option value="">All</option></select>
      </div>

      <div class="field">
        <label for="sort">Sort</label>
        <select id="sort">
          <option value="newest">Newest</option>
          <option value="az">A → Z</option>
          <option value="priceAsc">Price: Low → High</option>
          <option value="priceDesc">Price: High → Low</option>
        </select>
      </div>

      <div class="btns">
        <button class="secondary" id="btnClear" type="button">Clear</button>
        <button class="secondary" id="btnReload" type="button">Reload</button>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  // ✅ Paste your CURRENT deployed Apps Script web app URL (must end with /exec)
  const API_URL = "https://script.google.com/macros/s/PASTE_DEPLOYED_ID_HERE/exec";

  const el = (id) => document.getElementById(id);
  const ui = {
    grid: el("grid"),
    q: el("q"),
    cat: el("cat"),
    mfg: el("mfg"),
    sort: el("sort"),
    btnClear: el("btnClear"),
    btnReload: el("btnReload"),
  };

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function jsonp(params={}) {
    return new Promise((resolve, reject) => {
      const cb = "ToroStoreCB_" + Math.random().toString(36).slice(2);
      const script = document.createElement("script");
      const _cbust = Date.now().toString(36) + Math.random().toString(36).slice(2);

      const q = new URLSearchParams({ ...params, callback: cb, _cbust }).toString();
      const fullUrl = API_URL.trim() + (API_URL.includes("?") ? "&" : "?") + q;

      const timeout = setTimeout(() => {
        cleanup();
        reject(new Error("JSONP timeout (15s). Check deployment permissions or URL."));
      }, 15000);

      function cleanup(){
        clearTimeout(timeout);
        script.remove();
        try { delete window[cb]; } catch(e){ window[cb] = undefined; }
      }

      window[cb] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error("JSONP load error. Usually wrong URL or blocked/unauthorized web app.")); };

      script.src = fullUrl;
      document.body.appendChild(script);
    });
  }

  function firstImage(item){
    for (let i=1;i<=6;i++){
      const v = String(item[`Image ${i}`] || "").trim();
      if (v) return v;
    }
    return "";
  }

  function priceNumber(p){
    const s = String(p ?? "").replace(/[^0-9.]/g,"").trim();
    const n = parseFloat(s);
    return Number.isFinite(n) ? n : NaN;
  }

  function buildFilters(items){
    const cats = new Set();
    const mfgs = new Set();
    items.forEach(it => {
      const c = String(it["Category"]||"").trim();
      const m = String(it["Manufacturer"]||"").trim();
      if (c) cats.add(c);
      if (m) mfgs.add(m);
    });

    const fill = (sel, values) => {
      const current = sel.value;
      sel.innerHTML = `<option value="">All</option>`;
      [...values].sort((a,b)=>a.localeCompare(b)).forEach(v=>{
        const o = document.createElement("option");
        o.value = v;
        o.textContent = v;
        sel.appendChild(o);
      });
      if ([...sel.options].some(o=>o.value===current)) sel.value = current;
    };

    fill(ui.cat, cats);
    fill(ui.mfg, mfgs);
  }

  function matches(item){
    const q = ui.q.value.trim().toLowerCase();
    const cat = ui.cat.value.trim().toLowerCase();
    const mfg = ui.mfg.value.trim().toLowerCase();

    if (cat && String(item["Category"]||"").trim().toLowerCase() !== cat) return false;
    if (mfg && String(item["Manufacturer"]||"").trim().toLowerCase() !== mfg) return false;

    if (q){
      const hay = [
        item["Item ID"], item["Category"], item["Manufacturer"], item["Model"],
        item["Condition"], item["Description"], item["Location"]
      ].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  }

  function sortItems(items){
    const mode = ui.sort.value;
    const copy = items.slice();

    if (mode === "priceAsc"){
      copy.sort((a,b)=> (priceNumber(a["Price"])||Infinity) - (priceNumber(b["Price"])||Infinity));
    } else if (mode === "priceDesc"){
      copy.sort((a,b)=> (priceNumber(b["Price"])||-Infinity) - (priceNumber(a["Price"])||Infinity));
    } else if (mode === "az"){
      copy.sort((a,b)=> {
        const ta = `${a["Manufacturer"]||""} ${a["Model"]||""}`.trim();
        const tb = `${b["Manufacturer"]||""} ${b["Model"]||""}`.trim();
        return ta.localeCompare(tb);
      });
    } else {
      copy.sort((a,b)=> String(b["Item ID"]||"").localeCompare(String(a["Item ID"]||"")));
    }
    return copy;
  }

  function isHtmlSnippet(s){
    const t = String(s || "").trim();
    return t.includes("<") && t.includes(">");
  }

  function looksLikePayPalSnippet(s){
    const t = String(s || "").toLowerCase();
    return t.includes("paypal");
  }

  function render(items){
    ui.grid.innerHTML = "";
    const filtered = sortItems(items.filter(matches));

    if (!filtered.length){
      ui.grid.innerHTML = `<div style="grid-column:1/-1;color:#64748b;font-size:12px;padding:10px 2px">No matches.</div>`;
      return;
    }

    filtered.forEach(it=>{
      const id = String(it["Item ID"]||"").trim();
      const title = `${it["Manufacturer"]||""} ${it["Model"]||""}`.trim() || "(Item)";
      const cat = String(it["Category"]||"").trim();
      const cond = String(it["Condition"]||"").trim();
      const loc = String(it["Location"]||"").trim();
      const desc = String(it["Description"]||"").trim();
      const priceRaw = String(it["Price"]||"").trim();
      const img = firstImage(it);

      const paypalBtn = String(it["PayPal Button"]||"").trim();
      const buyLink = String(it["Buy Link"]||"").trim();

      const card = document.createElement("div");
      card.className = "card";

      const imgHtml = img
        ? `<img src="${escapeHtml(img)}" alt="${escapeHtml(title)}" loading="lazy" referrerpolicy="no-referrer" />`
        : `<div class="ph">No image</div>`;

      card.innerHTML = `
        <div class="img">${imgHtml}</div>
        <div class="bd">
          <div>
            <div class="title">${escapeHtml(title)}</div>
            <div class="meta">${escapeHtml([cat, cond, loc].filter(Boolean).join(" • "))}</div>
            ${desc ? `<div class="meta" style="margin-top:8px">${escapeHtml(desc).slice(0,240)}${desc.length>240?"…":""}</div>` : ""}
            <div class="meta" style="margin-top:8px;opacity:.85">Item ID: ${escapeHtml(id)}</div>
          </div>
          <div class="priceRow">
            <div class="price">${priceRaw ? "$" + escapeHtml(priceRaw) : "—"}</div>
            <div class="buySlot"></div>
          </div>
        </div>
      `;

      const slot = card.querySelector(".buySlot");

      if (paypalBtn && isHtmlSnippet(paypalBtn) && looksLikePayPalSnippet(paypalBtn)) {
        const wrap = document.createElement("div");
        wrap.className = "ppwrap";
        wrap.innerHTML = paypalBtn;
        slot.appendChild(wrap);
      } else if (paypalBtn && !isHtmlSnippet(paypalBtn)) {
        const a = document.createElement("a");
        a.className = "btnlink secondary";
        a.href = "#";
        a.onclick = (e)=>{ e.preventDefault(); alert("PayPal Button preset key is present but was not expanded into HTML. Key: " + paypalBtn); };
        a.textContent = "PayPal Preset";
        slot.appendChild(a);
      } else if (buyLink) {
        if (isHtmlSnippet(buyLink)) {
          slot.innerHTML = buyLink;
        } else {
          const a = document.createElement("a");
          a.className = "btnlink";
          a.href = buyLink;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = "Buy";
          slot.appendChild(a);
        }
      } else {
        const a = document.createElement("a");
        a.className = "btnlink secondary";
        a.href = "#";
        a.onclick = (e)=>{ e.preventDefault(); alert("No PayPal button or Buy Link set for this item yet."); };
        a.textContent = "Unavailable";
        slot.appendChild(a);
      }

      ui.grid.appendChild(card);
    });
  }

  async function load(){
    try{
      const res = await jsonp({ action: "storeItems" });
      if (!res?.ok) throw new Error(res?.error || "storeItems failed");

      let items = Array.isArray(res.items) ? res.items : [];

      // fail-safe availability gate
      items = items.filter(it => {
        const a = String(it["Availability"] ?? "").trim().toLowerCase();
        return !a || a === "listed";
      });

      window.__STORE_ITEMS__ = items;

      buildFilters(items);
      render(items);
    }catch(err){
      ui.grid.innerHTML = `<div class="errorBox">
        <b>Store load failed:</b> ${escapeHtml(err.message)}
      </div>`;
    }
  }

  function clearFilters(){
    ui.q.value = "";
    ui.cat.value = "";
    ui.mfg.value = "";
    ui.sort.value = "newest";
    render(window.__STORE_ITEMS__ || []);
  }

  ui.q.addEventListener("input", ()=> render(window.__STORE_ITEMS__ || []));
  ui.cat.addEventListener("change", ()=> render(window.__STORE_ITEMS__ || []));
  ui.mfg.addEventListener("change", ()=> render(window.__STORE_ITEMS__ || []));
  ui.sort.addEventListener("change", ()=> render(window.__STORE_ITEMS__ || []));

  ui.btnClear.addEventListener("click", clearFilters);
  ui.btnReload.addEventListener("click", load);

  load();
});
</script>
</body>
</html>
