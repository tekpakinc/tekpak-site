<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tek-Pak Store</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f6f7fb;color:#111}
    header{background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:14px 18px;position:sticky;top:0;z-index:10;display:flex;gap:14px;align-items:center}
    header img{height:44px}
    .wrap{max-width:1100px;margin:18px auto;padding:0 16px}
    .tools{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
    input,select{padding:10px 12px;border:1px solid #d7dbe7;border-radius:10px;background:#fff}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
    .card{background:#fff;border:1px solid #e6e9f2;border-radius:16px;box-shadow:0 10px 24px rgba(0,0,0,.06);overflow:hidden;display:flex;flex-direction:column}
    .img{height:170px;background:#eef1f8;display:flex;align-items:center;justify-content:center}
    .img img{max-height:100%;max-width:100%;object-fit:contain}
    .pad{padding:12px 14px}
    .title{font-weight:750;margin:0 0 6px}
    .meta{opacity:.8;font-size:13px;margin:0 0 10px}
    .price{font-size:18px;font-weight:800;margin:0 0 10px}
    .note{font-size:12px;opacity:.8;margin:8px 0 0}
    .pp{padding:0 14px 14px}
    .badge{display:inline-block;font-size:12px;padding:4px 8px;border-radius:999px;background:#eef7ff;border:1px solid #cfe7ff;margin-left:8px}
    .pill{display:inline-block;font-size:12px;padding:4px 8px;border-radius:999px;background:#f3fff0;border:1px solid #d7f3cf}
    /* modal */
    .modalBack{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px}
    .modal{background:#fff;border-radius:16px;max-width:420px;width:100%;padding:14px;border:1px solid #e6e9f2;box-shadow:0 22px 60px rgba(0,0,0,.25)}
    .modal h3{margin:0 0 8px}
    .modal p{margin:0 0 10px;opacity:.85}
    .modal .row{display:flex;gap:10px}
    .btn{padding:10px 12px;border-radius:10px;border:0;font-weight:800;cursor:pointer}
    .btnPrimary{background:#111;color:#fff}
    .btnGhost{background:#f4f6fb}
    .err{color:#b00020;font-size:12px;display:none;margin-top:8px}
  </style>

  <!-- PayPal JS SDK -->
  <script src="https://www.paypal.com/sdk/js?client-id=AcxyZvGvLed2b1AVcDAzcBBhhlv-2HeCZeJzQV6zacPXMDghy9g0GcS8V4tOkM7E0Zsr-JSBMA0RQLvF&currency=USD&intent=capture"></script>
</head>
<body>
  <header>
    <img src="assets/tekpak-logo.png" alt="Tek-Pak">
    <div style="flex:1">
      <div style="font-weight:850">Tek-Pak Store</div>
      <div style="font-size:13px;opacity:.8">Free shipping over $25 • Secure PayPal checkout</div>
    </div>
  </header>

  <div class="wrap">
    <div class="tools">
      <input id="q" placeholder="Search…" oninput="render()">
      <select id="cat" onchange="render()"><option value="">All categories</option></select>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <!-- ZIP modal -->
  <div id="zipBack" class="modalBack">
    <div class="modal">
      <h3>Calculate shipping</h3>
      <p>Orders under <b>$25</b> need a ZIP code to calculate shipping.</p>
      <div class="row">
        <input id="zipInput" inputmode="numeric" placeholder="ZIP (5 digits)" maxlength="5">
        <button class="btn btnPrimary" onclick="zipConfirm()">Continue</button>
      </div>
      <div id="zipErr" class="err">Please enter a valid 5-digit ZIP.</div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
        <button class="btn btnGhost" onclick="zipCancel()">Cancel</button>
      </div>
    </div>
  </div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwiY4C5DWNjOE1xSdpvn3lsOJsRrS11RJSzIWKDdIDHeqbbgbNdcS0osLo780d5VsZ6/exec";
let ITEMS = [];
let pendingZipResolve = null;

async function load() {
  const res = await fetch(`${API}?action=listPublic`);
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "Failed to load");
  ITEMS = data.items || [];
  fillCategories();
  render();
}

function fillCategories(){
  const cats = [...new Set(ITEMS.map(x => x.Category).filter(Boolean))].sort();
  const sel = document.getElementById("cat");
  cats.forEach(c => {
    const o = document.createElement("option");
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function money(n){ return `$${Number(n||0).toFixed(2)}`; }
function isValidZip(z){ return /^\d{5}$/.test(String(z||"").trim()); }

function openZipModal(){
  document.getElementById("zipInput").value = "";
  document.getElementById("zipErr").style.display = "none";
  document.getElementById("zipBack").style.display = "flex";
  document.getElementById("zipInput").focus();
}
function closeZipModal(){
  document.getElementById("zipBack").style.display = "none";
}
function zipConfirm(){
  const zip = document.getElementById("zipInput").value.trim();
  if (!isValidZip(zip)) {
    document.getElementById("zipErr").style.display = "block";
    return;
  }
  closeZipModal();
  if (pendingZipResolve) pendingZipResolve(zip);
  pendingZipResolve = null;
}
function zipCancel(){
  closeZipModal();
  if (pendingZipResolve) pendingZipResolve(null);
  pendingZipResolve = null;
}
function askZip(){
  return new Promise(resolve => {
    pendingZipResolve = resolve;
    openZipModal();
  });
}

function render(){
  const q = document.getElementById("q").value.trim().toLowerCase();
  const cat = document.getElementById("cat").value;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  const filtered = ITEMS.filter(it => {
    if (cat && it.Category !== cat) return false;
    if (!q) return true;
    const blob = `${it.Title||""} ${it.Description||""} ${it.SKU||""} ${it.Condition||""}`.toLowerCase();
    return blob.includes(q);
  });

  filtered.forEach(it => {
    const card = document.createElement("div");
    card.className = "card";

    const img = document.createElement("div");
    img.className = "img";
    img.innerHTML = it.PhotoURL ? `<img src="${it.PhotoURL}" alt="">` : `<div style="opacity:.6">No photo</div>`;

    const pad = document.createElement("div");
    pad.className = "pad";

    const shipLabel = it.PickupOnly
      ? `<span class="pill">Pickup only</span>`
      : `<span class="pill">Free ship $25+</span>`;

    pad.innerHTML = `
      <p class="title">${escapeHtml(it.Title || "Item")} <span class="badge">${escapeHtml(it.Condition || "Surplus")}</span></p>
      <p class="meta">${escapeHtml(it.SKU || it.ID)} • ${escapeHtml(it.Category || "Misc")} • ${shipLabel}</p>
      <p class="price">${money(it.Price)}</p>
      <div style="font-size:13px;opacity:.9">${escapeHtml((it.Description||"").slice(0,140))}${(it.Description||"").length>140?"…":""}</div>
      <div class="note">Qty available: ${Number(it.Qty||0)}</div>
    `;

    const pp = document.createElement("div");
    pp.className = "pp";
    const btnId = `pp_${it.ID.replace(/[^a-zA-Z0-9_]/g,"_")}`;
    pp.innerHTML = `<div id="${btnId}"></div>`;

    card.appendChild(img);
    card.appendChild(pad);
    card.appendChild(pp);
    grid.appendChild(card);

    paypal.Buttons({
      style: { layout: 'vertical', label: 'paypal' },

      createOrder: async () => {
        // If pickup only OR price >= 25, ZIP not needed.
        let buyerZip = "";

        if (!it.PickupOnly && Number(it.Price||0) < 25) {
          buyerZip = await askZip();
          if (!buyerZip) throw new Error("Checkout cancelled.");
        }

        const r = await fetch(API, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify({ action:"createOrder", itemId: it.ID, qty: 1, buyerZip })
        });
        const d = await r.json();

        // Backend can explicitly ask for ZIP
        if (!d.ok && d.error === "ZIP_REQUIRED") {
          const zip2 = await askZip();
          if (!zip2) throw new Error("Checkout cancelled.");
          const r2 = await fetch(API, {
            method: "POST",
            headers: { "Content-Type":"application/json" },
            body: JSON.stringify({ action:"createOrder", itemId: it.ID, qty: 1, buyerZip: zip2 })
          });
          const d2 = await r2.json();
          if (!d2.ok) throw new Error(d2.error || "Order create failed");
          return d2.orderId;
        }

        if (!d.ok) throw new Error(d.error || "Order create failed");
        return d.orderId;
      },

      onApprove: async (data) => {
        const r = await fetch(API, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ action:"captureOrder", orderId: data.orderID, itemId: it.ID })
        });
        const d = await r.json();
        if (!d.ok) throw new Error(d.error || "Capture failed");
        alert("Payment received! We’ll email shipping updates.");
        await load();
      }
    }).render(`#${btnId}`);
  });

  if (!filtered.length) {
    grid.innerHTML = `<div style="opacity:.75">No items match your search.</div>`;
  }
}

function escapeHtml(s){
  return String(s||"").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));
}

load().catch(err => {
  console.error(err);
  document.getElementById("grid").innerHTML = `<div style="padding:12px;background:#fff;border:1px solid #e6e9f2;border-radius:12px">
    <b>Couldn’t load store.</b><div style="opacity:.8;margin-top:6px">${escapeHtml(err.message)}</div>
  </div>`;
});
</script>
</body>
</html>
