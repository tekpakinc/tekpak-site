<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Tek-Pak Store</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --line:#e4e8f0; --text:#111827; --muted:#6b7280;
      --accent:#84cc16; --accent2:#1d4ed8;
      --shadow:0 12px 30px rgba(0,0,0,.08); --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1200px;margin:22px auto;padding:0 16px}
    header{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:44px;height:44px;border-radius:14px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;box-shadow:var(--shadow);font-weight:900}
    h1{margin:0;font-size:1.25rem}
    .sub{color:var(--muted);font-size:.9rem;margin-top:2px}
    .status{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-weight:800;font-size:.82rem;background:#eff6ff;border:1px solid #bfdbfe;color:var(--accent2)}

    .controls{
      background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:14px;margin-bottom:14px;
      display:grid;gap:12px;
      grid-template-columns: 2fr 1fr 1fr auto;
      align-items:end;
    }
    @media (max-width:980px){.controls{grid-template-columns:1fr}}
    label{display:block;font-size:.82rem;font-weight:900;margin-bottom:6px;color:#0f172a}
    input,select,button{font:inherit}
    input,select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid #d2d8e4;background:#fff}
    button{border:0;border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:900;background:#111827;color:#fff}
    button.secondary{background:var(--accent);color:#111}

    .grid{display:grid;gap:12px;grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width:1100px){.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
    @media (max-width:760px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media (max-width:480px){.grid{grid-template-columns:1fr}}

    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:340px}
    .thumb{height:170px;background:#f1f5f9;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .thumb .ph{color:var(--muted);font-weight:900;font-size:.85rem;padding:10px;text-align:center}
    .body{padding:12px;display:flex;flex-direction:column;gap:8px;flex:1}
    .title{font-weight:1000;line-height:1.15}
    .meta{color:var(--muted);font-size:.85rem;display:flex;flex-wrap:wrap;gap:8px}
    .pill{display:inline-flex;align-items:center;gap:6px;font-size:.76rem;font-weight:900;padding:4px 8px;border-radius:999px;border:1px solid #e5e7eb;background:#f3f4f6;color:#111827}
    .pill.blue{border-color:#dbeafe;background:#eff6ff;color:#1d4ed8}
    .price{font-size:1.05rem;font-weight:1000}
    .actions{padding:12px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
    .actions a.buy{
      flex:1; display:inline-flex; justify-content:center; align-items:center;
      border-radius:12px; padding:10px 14px; font-weight:1000;
      background:var(--accent); color:#111;
    }
    .actions button{flex:0 0 auto;background:#eef2f7;border:1px solid var(--line);color:#111827}

    .empty{background:var(--card);border:1px dashed #cbd5e1;border-radius:var(--radius);padding:18px;text-align:center;color:var(--muted);font-weight:900}

    /* Modal */
    .modalBack{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:16px}
    .modal{width:min(900px, 100%);background:#fff;border-radius:18px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(0,0,0,.25);overflow:hidden}
    .modalTop{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line)}
    .modalTop strong{font-size:.95rem}
    .modalTop button{background:#eef2f7;border:1px solid var(--line);color:#111827}
    .modalGrid{display:grid;grid-template-columns:1.2fr 1fr;gap:0}
    @media (max-width:860px){.modalGrid{grid-template-columns:1fr}}
    .modalImg{background:#f1f5f9;min-height:260px}
    .modalImg img{width:100%;height:100%;object-fit:cover;display:block}
    .modalBody{padding:14px;display:flex;flex-direction:column;gap:10px}
    .modalBody .big{font-size:1.05rem;font-weight:1000}
    .modalBody .small{color:var(--muted);font-size:.9rem;line-height:1.35}
    .modalBody .row{display:flex;flex-wrap:wrap;gap:8px}
    .modalBody a.buy{
      display:inline-flex;justify-content:center;align-items:center;
      border-radius:12px;padding:10px 14px;font-weight:1000;
      background:var(--accent);color:#111;text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="logo">TP</div>
        <div>
          <h1>Tek-Pak Store</h1>
          <div class="sub">Only items marked <strong>Listed</strong> appear here.</div>
        </div>
      </div>
      <div class="status" id="statusPill">● Loading…</div>
    </header>

    <section class="controls">
      <div>
        <label for="q">Search</label>
        <input id="q" placeholder="Search title, model, item number, details…" />
      </div>
      <div>
        <label for="manufacturer">Manufacturer</label>
        <select id="manufacturer">
          <option value="">All</option>
        </select>
      </div>
      <div>
        <label for="condition">Condition</label>
        <select id="condition">
          <option value="">All</option>
        </select>
      </div>
      <div style="display:flex;gap:10px">
        <button class="secondary" id="applyBtn">Apply</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>

    <section id="grid" class="grid"></section>
    <section id="empty" class="empty" style="display:none;">No listed items matched your filters.</section>
  </div>

  <!-- Modal -->
  <div class="modalBack" id="modalBack">
    <div class="modal">
      <div class="modalTop">
        <strong id="modalTitle">Item</strong>
        <button id="closeModalBtn">Close</button>
      </div>
      <div class="modalGrid">
        <div class="modalImg" id="modalImg"></div>
        <div class="modalBody">
          <div class="big" id="modalBig"></div>
          <div class="row" id="modalPills"></div>
          <div class="price" id="modalPrice"></div>
          <div class="small" id="modalDetails"></div>
          <div class="row">
            <a class="buy" id="modalBuy" href="#" target="_blank" rel="noopener">Buy Now</a>
            <button id="copyIdBtn">Copy Item Number</button>
          </div>
          <div class="small" id="modalDisclaimer">PayPal checkout opens in a new tab.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFxhPq9Kg7BGTZan_V2LBiHhNt1fZOWwrIrBmI65Srges7t_UJAY0GPtPrkqlH5WdKNA/exec";

    const els = {
      statusPill: document.getElementById("statusPill"),
      q: document.getElementById("q"),
      manufacturer: document.getElementById("manufacturer"),
      condition: document.getElementById("condition"),
      applyBtn: document.getElementById("applyBtn"),
      resetBtn: document.getElementById("resetBtn"),
      grid: document.getElementById("grid"),
      empty: document.getElementById("empty"),

      modalBack: document.getElementById("modalBack"),
      modalTitle: document.getElementById("modalTitle"),
      modalBig: document.getElementById("modalBig"),
      modalPills: document.getElementById("modalPills"),
      modalImg: document.getElementById("modalImg"),
      modalDetails: document.getElementById("modalDetails"),
      modalPrice: document.getElementById("modalPrice"),
      modalBuy: document.getElementById("modalBuy"),
      closeModalBtn: document.getElementById("closeModalBtn"),
      copyIdBtn: document.getElementById("copyIdBtn")
    };

    let selected = null;

    function setStatus(text){ els.statusPill.textContent = "● " + text; }

    // JSONP
    function loadJSONP(url, callbackName){
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = setTimeout(() => { cleanup(); reject(new Error("JSONP timeout")); }, 9000);
        function cleanup(){ clearTimeout(timeout); script.remove(); }
        window[callbackName] = (data) => { cleanup(); delete window[callbackName]; resolve(data); };
        script.onerror = () => { cleanup(); delete window[callbackName]; reject(new Error("JSONP load failed")); };
        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function apiGet(params){
      const cb = "tp_cb_" + Math.random().toString(16).slice(2);
      const url = new URL(APPS_SCRIPT_URL);
      Object.entries(params).forEach(([k,v]) => {
        if (v !== undefined && v !== null && String(v).trim() !== "") url.searchParams.set(k, v);
      });
      url.searchParams.set("callback", cb);
      return await loadJSONP(url.toString(), cb);
    }

    function setSelectOptions(selectEl, items){
      const current = selectEl.value;
      selectEl.innerHTML = "";
      const opt0 = document.createElement("option");
      opt0.value = "";
      opt0.textContent = "All";
      selectEl.appendChild(opt0);

      (items || []).forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v;
        selectEl.appendChild(opt);
      });

      if ([...selectEl.options].some(o => o.value === current)) selectEl.value = current;
    }

    function moneyPretty(v){
      const s = String(v || "").trim();
      if (!s) return "";
      const n = Number(s.replace(/[^0-9.]/g,""));
      if (!isFinite(n)) return s;
      return n.toLocaleString(undefined, { style:"currency", currency:"USD" });
    }

    function render(items){
      els.grid.innerHTML = "";
      els.empty.style.display = items.length ? "none" : "block";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        const thumb = document.createElement("div");
        thumb.className = "thumb";
        if (item.image1){
          const img = document.createElement("img");
          img.src = item.image1;
          img.alt = item.title || item.itemNumber || "Item";
          img.onerror = () => { thumb.innerHTML = `<div class="ph">No Image</div>`; };
          thumb.appendChild(img);
        } else {
          thumb.innerHTML = `<div class="ph">No Image</div>`;
        }

        const body = document.createElement("div");
        body.className = "body";

        const t = document.createElement("div");
        t.className = "title";
        t.textContent = item.title || "(No Title)";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = [item.manufacturer, item.model].filter(Boolean).join(" • ");

        const pillRow = document.createElement("div");
        pillRow.style.display = "flex";
        pillRow.style.flexWrap = "wrap";
        pillRow.style.gap = "8px";

        const idP = document.createElement("span");
        idP.className = "pill blue";
        idP.textContent = item.itemNumber || "No ID";
        pillRow.appendChild(idP);

        if (item.condition){
          const cP = document.createElement("span");
          cP.className = "pill";
          cP.textContent = item.condition;
          pillRow.appendChild(cP);
        }

        const priceTxt = moneyPretty(item.price);
        const price = document.createElement("div");
        price.className = "price";
        price.textContent = priceTxt ? priceTxt : "";

        body.appendChild(t);
        body.appendChild(meta);
        body.appendChild(pillRow);
        if (priceTxt) body.appendChild(price);

        const actions = document.createElement("div");
        actions.className = "actions";

        const viewBtn = document.createElement("button");
        viewBtn.textContent = "View";
        viewBtn.onclick = () => openModal(item);

        if (item.buyLink){
          const buy = document.createElement("a");
          buy.className = "buy";
          buy.href = item.buyLink;
          buy.target = "_blank";
          buy.rel = "noopener";
          buy.textContent = "Buy Now";
          actions.appendChild(buy);
        } else {
          const buyDisabled = document.createElement("button");
          buyDisabled.textContent = "No Buy Link";
          buyDisabled.disabled = true;
          buyDisabled.style.opacity = "0.55";
          actions.appendChild(buyDisabled);
        }

        actions.appendChild(viewBtn);

        card.appendChild(thumb);
        card.appendChild(body);
        card.appendChild(actions);

        els.grid.appendChild(card);
      });
    }

    function openModal(item){
      selected = item;
      els.modalTitle.textContent = item.itemNumber || "Item";
      els.modalBig.textContent = item.title || "(No Title)";

      els.modalPills.innerHTML = "";
      const pills = [
        item.manufacturer ? item.manufacturer : null,
        item.model ? item.model : null,
        item.condition ? item.condition : null,
        item.itemNumber ? item.itemNumber : null
      ].filter(Boolean);

      pills.forEach((txt, i) => {
        const s = document.createElement("span");
        s.className = i === pills.length - 1 ? "pill blue" : "pill";
        s.textContent = txt;
        els.modalPills.appendChild(s);
      });

      els.modalImg.innerHTML = "";
      if (item.image1){
        const img = document.createElement("img");
        img.src = item.image1;
        img.alt = item.title || item.itemNumber || "Item";
        img.onerror = () => { els.modalImg.innerHTML = ""; };
        els.modalImg.appendChild(img);
      }

      els.modalDetails.textContent = item.details ? item.details : "No details provided.";

      const priceTxt = moneyPretty(item.price);
      els.modalPrice.textContent = priceTxt ? priceTxt : "";

      if (item.buyLink){
        els.modalBuy.style.display = "inline-flex";
        els.modalBuy.href = item.buyLink;
      } else {
        els.modalBuy.style.display = "none";
        els.modalBuy.href = "#";
      }

      els.modalBack.style.display = "flex";
    }

    function closeModal(){
      els.modalBack.style.display = "none";
      selected = null;
    }

    async function loadFilters(){
      // Reuse Dropdowns for manufacturer/condition
      try{
        const d = await apiGet({ action:"dropdowns" });
        if (d && d.ok){
          setSelectOptions(els.manufacturer, d.dropdowns.Manufacturer || []);
          setSelectOptions(els.condition, d.dropdowns.Condition || []);
        }
      } catch (e) { /* store still works without these */ }
    }

    async function loadItems(){
      setStatus("Loading listed items…");

      const params = {
        action: "storeItems",
        q: els.q.value.trim(),
        manufacturer: els.manufacturer.value,
        condition: els.condition.value,
        limit: 80
      };

      try{
        const res = await apiGet(params);
        if (!res || !res.ok) throw new Error(res?.error || "Load failed");
        render(res.items || []);
        setStatus(`Showing ${(res.items || []).length} items`);
      } catch (e){
        console.error(e);
        render([]);
        setStatus("Connection error");
      }
    }

    els.applyBtn.addEventListener("click", loadItems);
    els.resetBtn.addEventListener("click", () => {
      els.q.value = "";
      els.manufacturer.value = "";
      els.condition.value = "";
      loadItems();
    });

    els.q.addEventListener("keydown", (e) => {
      if (e.key === "Enter"){ e.preventDefault(); loadItems(); }
    });

    els.closeModalBtn.addEventListener("click", closeModal);
    els.modalBack.addEventListener("click", (e) => { if (e.target === els.modalBack) closeModal(); });

    els.copyIdBtn.addEventListener("click", async () => {
      if (!selected) return;
      await navigator.clipboard.writeText(selected.itemNumber || "");
      setStatus("Copied Item Number");
      setTimeout(()=>setStatus("Ready"), 900);
    });

    (async () => {
      await loadFilters();
      await loadItems();
    })();
  </script>
</body>
</html>
