<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tek-Pak eBay HTML Generator</title>

<style>
body{
    font-family:system-ui,Arial;
    background:#f5f7fb;
    margin:0;
}

header{
    background:#111;
    color:white;
    padding:14px 20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

input{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-bottom:10px;
}

button{
    padding:10px 18px;
    font-size:16px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:400px;
    margin-top:20px;
    font-family:monospace;
    padding:10px;
}
</style>
</head>

<body>

<header>
<h2>Tek-Pak eBay Listing Generator</h2>
</header>

<div class="container">

<div class="card">

<label>Enter Item ID</label>
<input id="itemID" placeholder="TP-XXXXXX-XXXX">

<button onclick="generate()">Generate eBay HTML</button>

<textarea id="output"></textarea>

<button onclick="copyCode()">Copy Code</button>

</div>

</div>

<script>

const API = "YOUR_SCRIPT_URL";

function jsonp(url){
    return new Promise((resolve,reject)=>{
        const callback="cb"+Math.random().toString(36).substr(2);

        window[callback]=(data)=>{
            delete window[callback];
            document.body.removeChild(script);
            resolve(data);
        };

        const script=document.createElement("script");
        script.src=url+"&callback="+callback;
        script.onerror=reject;

        document.body.appendChild(script);
    });
}

async function generate(){

    const id=document.getElementById("itemID").value.trim();

    if(!id){
        alert("Enter Item ID");
        return;
    }

    const data=await jsonp(API+"?action=getInventory");

    const item=data.find(x=>x["Item ID"]==id);

    if(!item){
        alert("Item not found");
        return;
    }

    const html=buildHTML(item);

    document.getElementById("output").value=html;
}

function buildHTML(item){

return `
<div style="font-family:Arial;max-width:900px;margin:auto">

<h2>${item.Name || ""}</h2>

<p><b>Item ID:</b> ${item["Item ID"]}</p>

<p><b>Manufacturer:</b> ${item.Manufacturer || ""}</p>

<p><b>Condition:</b> ${item.Condition || ""}</p>

<p>${item.Description || ""}</p>

<hr>

<h3>Specifications</h3>

<ul>
<li>Category: ${item.Category || ""}</li>
<li>Model: ${item.Model || ""}</li>
<li>Storage: ${item.Storage || ""}</li>
<li>Memory: ${item.Memory || ""}</li>
<li>Operating System: ${item["Operating System"] || ""}</li>
</ul>

<hr>

<h3>What's Included</h3>

<p>Item as shown in photos.</p>

<hr>

<h3>Shipping</h3>

<p>Fast shipping from Tek-Pak Inc.</p>

<hr>

<h3>Support</h3>

<p>If you have any questions please contact Tek-Pak through eBay messages.</p>

<hr>

<p style="font-size:12px;color:#777">
ITEM ID: ${item["Item ID"]}
</p>

</div>
`;
}

function copyCode(){

    const text=document.getElementById("output");

    text.select();
    document.execCommand("copy");

    alert("Copied!");
}

</script>

</body>
</html>
