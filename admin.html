<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Toro Admin (Fresh)</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --line:rgba(255,255,255,.12);
      --text:#f3f6ff;
      --muted:rgba(243,246,255,.68);
      --accent:#7cf7a6;
      --accent2:#7aa7ff;
      --bad:#ff6b7a;
      --warn:#ffcc66;
      --radius:16px;
      --shadow:0 18px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 520px at 25% -10%, rgba(122,167,255,.22), transparent 60%),
        radial-gradient(900px 480px at 95% 10%, rgba(124,247,166,.18), transparent 55%),
        radial-gradient(700px 420px at 30% 110%, rgba(255,204,102,.10), transparent 60%),
        var(--bg);
      color:var(--text);
    }
    header{
      position:sticky; top:0; z-index:50;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(11,16,32,.90), rgba(11,16,32,.55));
      border-bottom:1px solid var(--line);
    }
    .wrap{max-width:1200px;margin:0 auto;padding:14px 16px;}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:12px}
    .badge{
      width:42px;height:42px;border-radius:14px;
      background: radial-gradient(circle at 30% 30%, rgba(124,247,166,.95), rgba(122,167,255,.85));
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    h1{margin:0;font-size:18px}
    .sub{color:var(--muted);font-size:12px;margin-top:2px}
    .sig{color:rgba(243,246,255,.55);font-size:11px;margin-top:6px}
    code.k{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px;color:rgba(243,246,255,.78)}
    .btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

    button{
      border:0;
      border-radius:14px;
      padding:10px 12px;
      font-weight:900;
      cursor:pointer;
      color:#061016;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }
    button.secondary{
      color:var(--text);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }
    button.warn{
      color:#1a1200;
      background: linear-gradient(135deg, var(--warn), #ffdca0);
    }
    button:disabled{opacity:.55;cursor:not-allowed}

    .grid{
      max-width:1200px;
      margin:0 auto;
      padding:14px 16px 22px;
      display:grid;
      grid-template-columns: 420px 1fr;
      gap:14px;
    }
    @media (max-width:980px){ .grid{grid-template-columns:1fr} }

    .card{
      background: linear-gradient(180deg, rgba(18,26,51,.94), rgba(15,23,48,.94));
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{
      padding:14px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }
    .hd strong{font-size:14px}
    .bd{padding:14px}

    .status{
      font-size:12px;
      padding:9px 10px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18);
      color: var(--muted);
      word-break:break-word;
    }
    .status.good{border-color: rgba(124,247,166,.35); color: rgba(124,247,166,.95)}
    .status.bad{border-color: rgba(255,107,122,.35); color: rgba(255,107,122,.95)}
    .status.warn{border-color: rgba(255,204,102,.35); color: rgba(255,204,102,.95)}

    input, select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(6,10,22,.55);
      color: var(--text);
      outline:none;
    }
    textarea{min-height:110px; resize:vertical}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1}
    .note{font-size:12px;color:var(--muted);line-height:1.35}

    .list{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow:auto;padding-right:6px}
    .item{
      border:1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(6,10,22,.35);
      padding:10px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .item .a{font-weight:950;font-size:12px}
    .item .b{font-size:12px;color:var(--muted);margin-top:2px}
    .item .c{font-size:12px;color:rgba(122,167,255,.9);margin-top:6px}
    .item button{
      padding:8px 10px;
      border-radius: 12px;
      font-weight:900;
      background: rgba(124,247,166,.18);
      color: rgba(124,247,166,.95);
      border:1px solid rgba(124,247,166,.25);
    }

    .prog{
      width:100%;
      height:10px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      margin-top:10px;
      display:none;
    }
    .prog > div{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, rgba(124,247,166,.85), rgba(122,167,255,.85));
      transition: width .2s ease;
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="badge" aria-hidden="true"></div>
        <div>
          <h1>Toro Admin (Fresh Start)</h1>
          <div class="sub">Simple • Schema-driven • JSONP • GitHub-safe upload</div>
          <div class="sig">Backend: <code class="k" id="backendSig">not connected</code></div>
        </div>
      </div>
      <div class="btns">
        <button class="secondary" id="btnReload" type="button">Reload</button>
        <button class="secondary" id="btnNew" type="button">New</button>
        <button class="warn" id="btnSave" type="button">Save</button>
      </div>
    </div>
  </div>
</header>

<div class="grid">
  <!-- LEFT -->
  <section class="card">
    <div class="hd">
      <strong>Items</strong>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center">
        <input id="q" placeholder="Search Item ID / Manufacturer / Model…" style="min-width:240px" />
      </div>
    </div>
    <div class="bd">
      <div class="status" id="listStatus">Loading…</div>
      <div style="height:10px"></div>
      <div class="list" id="list"></div>
      <div style="height:10px"></div>
      <div class="note">Click <b>Load</b> to edit, then <b>Save</b>.</div>
    </div>
  </section>

  <!-- RIGHT -->
  <section class="card">
    <div class="hd">
      <strong>Editor</strong>
      <div class="btns">
        <button class="secondary" id="btnUpload" type="button">Upload Images</button>
      </div>
    </div>
    <div class="bd">
      <div class="status" id="status">Connecting…</div>
      <div class="prog" id="prog"><div id="progBar"></div></div>

      <div style="height:12px"></div>
      <div id="form"></div>

      <input id="filePicker" type="file" accept="image/*" multiple style="display:none" />
      <div style="height:12px"></div>
      <div class="note">
        Upload fills <b>Image 1–6</b>. If Drive folder ID isn’t set in script properties, upload will error (that’s normal).
      </div>
    </div>
  </section>
</div>

<script>
  // ✅ Your new backend
  const API_URL = "https://script.google.com/macros/s/AKfycbxBhLMKXr6cr2NRc7K5TRbZ91vM32MzJWrm0P6zeA74sGUukcnBdoV-Z0Z8ldwyXO-SaQ/exec";

  const $ = (id) => document.getElementById(id);
  const ui = {
    backendSig: $("backendSig"),
    status: $("status"),
    listStatus: $("listStatus"),
    list: $("list"),
    q: $("q"),
    form: $("form"),
    btnReload: $("btnReload"),
    btnNew: $("btnNew"),
    btnSave: $("btnSave"),
    btnUpload: $("btnUpload"),
    filePicker: $("filePicker"),
    prog: $("prog"),
    progBar: $("progBar"),
  };

  let INV_HEADERS = [];
  let DD_HEADERS = [];
  let DROPDOWNS = {};
  let CONTROLS = {}; // header -> input/select/textarea element
  let ITEMS = [];

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function setStatus(msg, kind=""){
    ui.status.className = "status" + (kind ? (" " + kind) : "");
    ui.status.textContent = msg;
  }

  function setListStatus(msg, kind=""){
    ui.listStatus.className = "status" + (kind ? (" " + kind) : "");
    ui.listStatus.textContent = msg;
  }

  function setBusy(b){
    [ui.btnReload, ui.btnNew, ui.btnSave, ui.btnUpload].forEach(x => x && (x.disabled = !!b));
    ui.q.disabled = !!b;
  }

  function setProg(show, pct=0){
    ui.prog.style.display = show ? "block" : "none";
    ui.progBar.style.width = Math.max(0, Math.min(100, pct)) + "%";
  }

  function jsonp(params={}){
    return new Promise((resolve, reject) => {
      const cb = "ToroCB_" + Math.random().toString(36).slice(2);
      const script = document.createElement("script");
      const _cbust = Date.now().toString(36) + Math.random().toString(36).slice(2);

      const q = new URLSearchParams({ ...params, callback: cb, _cbust }).toString();
      script.src = API_URL + (API_URL.includes("?") ? "&" : "?") + q;

      let done = false;
      const t = setTimeout(() => {
        cleanup();
        reject(new Error("JSONP timeout (15s). Check deployment access + /exec URL."));
      }, 15000);

      function cleanup(){
        if (done) return;
        done = true;
        clearTimeout(t);
        script.remove();
        try { delete window[cb]; } catch(_) { window[cb] = undefined; }
      }

      window[cb] = (data) => { cleanup(); resolve(data); };
      script.onerror = () => { cleanup(); reject(new Error("JSONP load error (endpoint blocked / wrong URL).")); };

      document.body.appendChild(script);
    });
  }

  async function ping(){
    const r = await jsonp({ action: "ping" });
    if (!r?.ok) throw new Error(r?.error || "Ping failed");
    ui.backendSig.textContent = `${r.version || ""} • sheet ${String(r.spreadsheetId||"").slice(0,8)}… • ${r.ts || ""}`;
  }

  async function loadSchema(){
    const r = await jsonp({ action: "schema" });
    if (!r?.ok) throw new Error(r?.error || "Schema failed");
    INV_HEADERS = Array.isArray(r.inventoryHeaders) ? r.inventoryHeaders : [];
    DD_HEADERS = Array.isArray(r.dropdownHeaders) ? r.dropdownHeaders : [];
    if (!INV_HEADERS.length) throw new Error("Inventory headers empty. Check Inventory tab row 1.");
  }

  async function loadDropdowns(){
    const r = await jsonp({ action: "getDropdowns" });
    if (!r?.ok) throw new Error(r?.error || "Dropdowns failed");
    DROPDOWNS = r.dropdowns || {};
  }

  function isTextAreaField(h){
    const k = String(h||"").toLowerCase();
    return (k === "description" || k === "notes");
  }

  function isImageField(h){
    return /^image\s[1-6]$/i.test(String(h||"").trim());
  }

  function buildForm(){
    ui.form.innerHTML = "";
    CONTROLS = {};

    const container = document.createElement("div");
    container.className = "row";

    INV_HEADERS.forEach((h) => {
      const field = document.createElement("div");
      field.className = "full";

      // Layout: pair most fields in 2-col, but keep Description/Notes full width
      const full = isTextAreaField(h) || isImageField(h);
      field.className = full ? "full" : "";

      const lab = document.createElement("label");
      lab.textContent = h;

      let input;

      const opts = Array.isArray(DROPDOWNS[h]) ? DROPDOWNS[h] : null;
      if (opts && opts.length) {
        input = document.createElement("select");
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "—";
        input.appendChild(empty);
        opts.forEach(v => {
          const o = document.createElement("option");
          o.value = v;
          o.textContent = v;
          input.appendChild(o);
        });
      } else if (isTextAreaField(h)) {
        input = document.createElement("textarea");
        input.placeholder = h === "Notes" ? "Internal only" : "Public description";
      } else {
        input = document.createElement("input");
        input.placeholder = h === "Item ID" ? "Leave blank to auto-generate" : "";
      }

      input.id = "f_" + h;
      CONTROLS[h] = input;

      field.appendChild(lab);
      field.appendChild(input);

      container.appendChild(field);
    });

    // Make it 2-col by default
    // We already use .row grid; just ensure non-full fields take 1 col
    [...container.children].forEach(child => {
      if (!child.className) child.className = ""; // 2-col
      if (child.className !== "full") child.style.minWidth = "0";
    });

    ui.form.appendChild(container);
  }

  function clearForm(){
    INV_HEADERS.forEach(h => {
      const c = CONTROLS[h];
      if (!c) return;
      c.value = "";
    });
    // If Availability exists and dropdown has Unlisted, default it
    if (CONTROLS["Availability"] && (DROPDOWNS["Availability"] || []).includes("Unlisted")) {
      CONTROLS["Availability"].value = "Unlisted";
    }
  }

  function collectPayload(){
    const payload = {};
    INV_HEADERS.forEach(h => {
      const c = CONTROLS[h];
      if (!c) return;
      payload[h] = c.value;
    });
    return payload;
  }

  function renderList(){
    ui.list.innerHTML = "";
    const q = (ui.q.value || "").trim().toLowerCase();

    const filtered = (ITEMS || []).filter(it => {
      if (!q) return true;
      const hay = [
        it["Item ID"], it["Manufacturer"], it["Model"], it["Category"], it["Condition"], it["Location"]
      ].join(" ").toLowerCase();
      return hay.includes(q);
    });

    if (!filtered.length){
      ui.list.innerHTML = `<div class="note">No matches.</div>`;
      return;
    }

    filtered.forEach(it => {
      const id = String(it["Item ID"] || "").trim();
      const title = `${it["Manufacturer"] || ""} ${it["Model"] || ""}`.trim() || "(No Model)";
      const sub = `${it["Category"] || ""} • ${it["Condition"] || ""} • ${it["Location"] || ""}`.trim();
      const price = String(it["Price"] || "").trim();

      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div style="min-width:0">
          <div class="a">${esc(id)}</div>
          <div class="b">${esc(title)}</div>
          <div class="c">${esc(sub)}${price ? " • $" + esc(price) : ""}</div>
        </div>
        <div><button type="button" data-load="${esc(id)}">Load</button></div>
      `;
      ui.list.appendChild(div);
    });

    ui.list.querySelectorAll("button[data-load]").forEach(btn => {
      btn.addEventListener("click", () => loadItem(btn.getAttribute("data-load")));
    });
  }

  async function refreshList(){
    setListStatus("Loading items…");
    const r = await jsonp({ action: "listItems" });
    if (!r?.ok) throw new Error(r?.error || "List failed");
    ITEMS = Array.isArray(r.items) ? r.items : [];
    setListStatus(`Loaded ${ITEMS.length} item(s).`, "good");
    renderList();
  }

  async function loadItem(itemId){
    setStatus("Loading " + itemId + "…");
    try{
      const r = await jsonp({ action: "getItem", itemId });
      if (!r?.ok) throw new Error(r?.error || "Get failed");
      const item = r.item || {};
      INV_HEADERS.forEach(h => {
        const c = CONTROLS[h];
        if (c) c.value = (item[h] ?? "");
      });
      setStatus("Loaded. Edit and Save.", "good");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }catch(e){
      setStatus("Load error: " + e.message, "bad");
    }
  }

  async function save(){
    setBusy(true);
    setStatus("Saving…");
    try{
      const payload = collectPayload();
      const r = await jsonp({ action: "upsertItem", payload: JSON.stringify(payload) });
      if (!r?.ok) throw new Error(r?.error || "Save failed");
      setStatus(`Saved (${r.mode}) • Row ${r.row} • Item ID ${r.itemId}`, "good");
      await refreshList();
      // Ensure form has generated Item ID if backend created it
      if (CONTROLS["Item ID"] && r.itemId) CONTROLS["Item ID"].value = r.itemId;
    }catch(e){
      setStatus("Save error: " + e.message, "bad");
    }finally{
      setBusy(false);
    }
  }

  // Upload helpers
  function readFileAsDataUrl(file){
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(String(fr.result || ""));
      fr.onerror = () => reject(new Error("File read error: " + (file?.name || "unknown")));
      fr.readAsDataURL(file);
    });
  }
  function makeJobId(){
    return (crypto && crypto.randomUUID) ? crypto.randomUUID() : ("job_" + Math.random().toString(16).slice(2));
  }

  async function uploadImages(files){
    const picked = Array.from(files || []).slice(0, 6);
    if (!picked.length) throw new Error("No files selected.");

    const itemId = String(CONTROLS["Item ID"]?.value || "").trim(); // may be blank; backend will still name as UNASSIGNED, but we prefer real ID
    if (!itemId){
      setStatus("Tip: save once first so Item ID exists, then upload images.", "warn");
    }

    setProg(true, 5);
    setStatus(`Preparing ${picked.length} image(s)…`);

    const payloadFiles = [];
    for (let i=0;i<picked.length;i++){
      setProg(true, 5 + Math.round((i / picked.length) * 25));
      const f = picked[i];
      const dataUrl = await readFileAsDataUrl(f);
      payloadFiles.push({ name: f.name, mime: f.type || "image/jpeg", dataUrl });
    }

    const jobId = makeJobId();
    setStatus("Uploading to Drive…");
    setProg(true, 35);

    // fire-and-forget
    await fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "uploadImagesJob",
        jobId,
        payload: { itemId: itemId || "UNASSIGNED", files: payloadFiles, makePublic: true }
      })
    });

    // poll status
    const start = Date.now();
    const maxWaitMs = 120000;

    while (true){
      setProg(true, 55);
      const r = await jsonp({ action: "uploadStatus", jobId });

      if (r?.status === "done" && r?.result?.ok){
        const images = r.result.images || [];
        const urls = images.map(x => x.url).filter(Boolean);

        // fill Image 1..6 (if fields exist in sheet)
        for (let i=0;i<6;i++){
          const h = `Image ${i+1}`;
          if (CONTROLS[h]) CONTROLS[h].value = urls[i] || "";
        }

        setProg(true, 100);
        setTimeout(() => setProg(false, 0), 700);
        setStatus(`Uploaded ${urls.length} image(s). Filled Image 1–${Math.min(6, urls.length)}.`, "good");
        return;
      }

      if (r?.status === "error"){
        throw new Error(r.error || "Upload failed");
      }

      if (Date.now() - start > maxWaitMs){
        throw new Error("Upload timed out (2 min).");
      }

      await new Promise(r => setTimeout(r, 1200));
    }
  }

  async function fullReload(){
    setBusy(true);
    try{
      await ping();
      await loadSchema();
      await loadDropdowns();
      buildForm();
      clearForm();
      await refreshList();
      setStatus("Ready.", "good");
    }catch(e){
      ui.backendSig.textContent = "NOT CONNECTED";
      setStatus("Startup error: " + e.message, "bad");
      setListStatus("Not loaded.", "bad");
    }finally{
      setBusy(false);
    }
  }

  // Wire
  ui.btnReload.addEventListener("click", fullReload);
  ui.btnNew.addEventListener("click", () => { clearForm(); setStatus("New item. Fill and Save.", ""); });
  ui.btnSave.addEventListener("click", save);
  ui.q.addEventListener("input", renderList);

  ui.btnUpload.addEventListener("click", () => { ui.filePicker.value=""; ui.filePicker.click(); });
  ui.filePicker.addEventListener("change", async () => {
    if (!ui.filePicker.files || !ui.filePicker.files.length) return;
    setBusy(true);
    try{
      await uploadImages(ui.filePicker.files);
    }catch(e){
      setProg(false, 0);
      setStatus("Upload error: " + e.message, "bad");
    }finally{
      setBusy(false);
    }
  });

  // Go
  fullReload();
</script>
</body>
</html>
