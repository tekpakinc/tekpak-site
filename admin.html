<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tek-Pak Inventory</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --line:#e4e8f0; --text:#111827; --muted:#6b7280;
      --accent:#84cc16; --accent-dark:#65a30d; --danger:#b91c1c; --ok:#166534; --info:#1d4ed8;
      --shadow:0 12px 30px rgba(0,0,0,.08); --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:22px auto;padding:0 16px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    h1{margin:0;font-size:1.25rem}
    .subtitle{margin:2px 0 0;color:var(--muted);font-size:.88rem}
    .status-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-size:.82rem;font-weight:700;border:1px solid transparent;white-space:nowrap}
    .status-pill.info{background:#eff6ff;color:var(--info);border-color:#bfdbfe}
    .status-pill.ok{background:#ecfdf3;color:var(--ok);border-color:#bbf7d0}
    .status-pill.err{background:#fef2f2;color:var(--danger);border-color:#fecaca}
    .status-pill.warn{background:#fff7ed;color:#9a3412;border-color:#fed7aa}

    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .grid{display:grid;gap:12px}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    @media (max-width:900px){.grid-4,.grid-3{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}

    label{display:block;font-size:.86rem;font-weight:700;margin-bottom:6px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;border:1px solid #d2d8e4;border-radius:10px;padding:10px 12px;background:#fff}
    textarea{min-height:95px;resize:vertical}
    .row-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
    button{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700}
    .btn{background:#111827;color:#fff}
    .btn-accent{background:var(--accent);color:#111}
    .btn-accent:hover{background:var(--accent-dark);color:#fff}
    .btn-ghost{background:#eef2f7;color:#111827;border:1px solid var(--line)}
    .mode-badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.75rem;font-weight:700;border:1px solid #ddd}
    .mode-badge.new{background:#ecfdf3;color:#166534;border-color:#bbf7d0}
    .mode-badge.edit{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
    .lookup-row{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line)}
    iframe{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Tek-Pak Inventory</h1>
        <div class="subtitle">
          <span id="modeBadge" class="mode-badge new">New Item Mode</span>
          &nbsp;Add or edit items
        </div>
      </div>
      <div id="statusPill" class="status-pill info">● Connecting…</div>
    </div>

    <div class="card">
      <div class="lookup-row">
        <div class="grid grid-3">
          <div>
            <label for="lookupItemId">Find Item (Item Number)</label>
            <input id="lookupItemId" type="text" placeholder="TP-MMDDYY-XXXX" />
          </div>
          <div style="display:flex;align-items:end;gap:8px;">
            <button type="button" class="btn" id="loadItemBtn">Load Item</button>
            <button type="button" class="btn-ghost" id="newModeBtn">New Item</button>
          </div>
          <div style="display:flex;align-items:end;color:#6b7280;font-size:.85rem;">
            Load to edit. New Item clears the form.
          </div>
        </div>
      </div>

      <!-- FORM POSTS DIRECTLY TO APPS SCRIPT (no fetch/CORS). -->
      <form id="inventoryForm" method="POST" target="saveFrame">
        <input type="hidden" name="sheetName" value="Inventory" />
        <input type="hidden" name="mode" id="modeField" value="create" />
        <input type="hidden" name="originalItemNumber" id="originalItemNumberField" value="" />

        <div class="grid grid-4">
          <div>
            <label for="itemNumber">Item Number</label>
            <div style="display:flex;gap:8px;">
              <input id="itemNumber" name="itemNumber" type="text" placeholder="TP-MMDDYY-XXXX" />
              <button type="button" class="btn-ghost" id="genIdBtn">Auto ID</button>
            </div>
          </div>
          <div>
            <label for="serialNumber">Serial Number</label>
            <input id="serialNumber" name="serialNumber" type="text" />
          </div>
          <div>
            <label for="manufacturer">Manufacturer</label>
            <select id="manufacturer" name="manufacturer"><option value="">Select manufacturer</option></select>
          </div>
          <div>
            <label for="model">Model</label>
            <input id="model" name="model" type="text" />
          </div>
        </div>

        <div class="grid grid-3" style="margin-top:12px;">
          <div>
            <label for="title">Title</label>
            <input id="title" name="title" type="text" />
          </div>
          <div>
            <label for="condition">Condition</label>
            <select id="condition" name="condition"><option value="">Select condition</option></select>
          </div>
          <div>
            <label for="availability">Availability</label>
            <select id="availability" name="availability"><option value="">Select availability</option></select>
          </div>
        </div>

        <div style="margin-top:12px;">
          <label>Image URLs</label>
          <div class="grid grid-3">
            <input name="image1" type="url" placeholder="Image 1 URL" />
            <input name="image2" type="url" placeholder="Image 2 URL" />
            <input name="image3" type="url" placeholder="Image 3 URL" />
            <input name="image4" type="url" placeholder="Image 4 URL" />
            <input name="image5" type="url" placeholder="Image 5 URL" />
            <input name="image6" type="url" placeholder="Image 6 URL" />
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="details">Details</label>
          <textarea id="details" name="details"></textarea>
        </div>

        <div style="margin-top:12px;">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes"></textarea>
        </div>

        <div class="row-actions">
          <button class="btn-accent" type="submit" id="saveBtn">Save</button>
          <button class="btn" type="button" id="saveNewBtn">Save + New</button>
          <button class="btn-ghost" type="reset">Clear</button>
          <button class="btn-ghost" type="button" id="reloadDropdownsBtn">Reload Dropdowns</button>
        </div>
      </form>

      <iframe name="saveFrame" id="saveFrame"></iframe>
    </div>
  </div>

  <script>
    // Your Apps Script URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDY3EmjCLDEqcdd7Dcbbn5L2k-cP6XI3DKbhGL1g9-UnIPHONPl8E5HjpiB2C5uXF3w/exec";

    const state = { mode:"new", originalItemNumber:"", loadedRowNumber:0, saveAndNew:false };

    const els = {
      statusPill: document.getElementById("statusPill"),
      modeBadge: document.getElementById("modeBadge"),
      saveBtn: document.getElementById("saveBtn"),
      form: document.getElementById("inventoryForm"),

      modeField: document.getElementById("modeField"),
      originalItemNumberField: document.getElementById("originalItemNumberField"),

      lookupItemId: document.getElementById("lookupItemId"),
      itemNumber: document.getElementById("itemNumber"),
      serialNumber: document.getElementById("serialNumber"),
      manufacturer: document.getElementById("manufacturer"),
      model: document.getElementById("model"),
      title: document.getElementById("title"),
      condition: document.getElementById("condition"),
      availability: document.getElementById("availability"),
      details: document.getElementById("details"),
      notes: document.getElementById("notes"),
    };

    function setPill(text, type="info"){
      els.statusPill.className = "status-pill " + type;
      els.statusPill.textContent = "● " + text;
    }

    function setMode(mode){
      state.mode = mode;
      if (mode === "edit") {
        els.modeBadge.textContent = "Edit Mode";
        els.modeBadge.className = "mode-badge edit";
        els.saveBtn.textContent = "Save Changes";
        els.modeField.value = "update";
      } else {
        els.modeBadge.textContent = "New Item Mode";
        els.modeBadge.className = "mode-badge new";
        els.saveBtn.textContent = "Save";
        els.modeField.value = "create";
      }
    }

    // JSONP loader (no CORS)
    function loadJSONP(url, callbackName){
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error("JSONP timeout"));
        }, 8000);

        function cleanup(){
          clearTimeout(timeout);
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          delete window[callbackName];
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          delete window[callbackName];
          reject(new Error("JSONP load failed"));
        };

        script.src = url;
        document.body.appendChild(script);
      });
    }

    async function apiGet(params){
      const cb = "tp_cb_" + Math.random().toString(16).slice(2);
      const url = new URL(APPS_SCRIPT_URL);
      Object.entries(params).forEach(([k,v]) => {
        if (v !== undefined && v !== null && String(v).trim() !== "") url.searchParams.set(k, v);
      });
      url.searchParams.set("callback", cb);
      return await loadJSONP(url.toString(), cb);
    }

    function setSelectOptions(selectEl, items, placeholder){
      const current = selectEl.value;
      selectEl.innerHTML = "";
      const first = document.createElement("option");
      first.value = "";
      first.textContent = placeholder;
      selectEl.appendChild(first);
      (items || []).forEach(item => {
        const opt = document.createElement("option");
        opt.value = item;
        opt.textContent = item;
        selectEl.appendChild(opt);
      });
      if ([...selectEl.options].some(o => o.value === current)) selectEl.value = current;
    }

    async function loadDropdowns(){
      setPill("Loading dropdowns…", "info");
      try {
        const data = await apiGet({ action:"dropdowns" });
        if (!data || !data.ok) throw new Error(data?.error || "Dropdowns failed");
        setSelectOptions(els.manufacturer, data.dropdowns.Manufacturer || [], "Select manufacturer");
        setSelectOptions(els.condition, data.dropdowns.Condition || [], "Select condition");
        setSelectOptions(els.availability, data.dropdowns.Availability || [], "Select availability");
        setPill("Connected", "ok");
      } catch (e){
        console.error(e);
        setPill("Connection error", "err");
      }
    }

    function randomLetters4(){
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let out = "";
      for (let i=0;i<4;i++) out += chars[Math.floor(Math.random()*chars.length)];
      return out;
    }
    function todayMMDDYY(){
      const d = new Date();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      const yy = String(d.getFullYear()).slice(-2);
      return `${mm}${dd}${yy}`;
    }

    async function autoId(){
      setPill("Generating ID…", "info");
      try{
        for (let i=0;i<20;i++){
          const candidate = `TP-${todayMMDDYY()}-${randomLetters4()}`;
          const v = await apiGet({ action:"validate", id:candidate });
          if (v && v.ok && !v.duplicateId){
            els.itemNumber.value = candidate;
            setPill("Unique ID generated", "ok");
            return;
          }
        }
        setPill("ID generation failed", "err");
      } catch(e){
        console.error(e);
        setPill("ID generation failed", "err");
      }
    }

    async function loadItem(){
      const id = els.lookupItemId.value.trim().toUpperCase();
      if (!id){ setPill("Enter Item Number", "warn"); return; }
      setPill("Loading item…", "info");
      try{
        const data = await apiGet({ action:"getItem", id });
        if (!data || !data.ok){ setPill(data?.error || "Not found", "err"); return; }

        const item = data.item || {};
        state.loadedRowNumber = Number(data.rowNumber || 0);
        state.originalItemNumber = String(item["Item Number"] || id).trim();

        els.itemNumber.value = item["Item Number"] || "";
        els.serialNumber.value = item["Serial Number"] || "";
        els.title.value = item["Title"] || "";
        els.manufacturer.value = item["Manufacturer"] || "";
        els.model.value = item["Model"] || "";
        els.condition.value = item["Condition"] || "";
        els.availability.value = item["Availability"] || "";
        document.querySelector('[name="image1"]').value = item["Image 1"] || "";
        document.querySelector('[name="image2"]').value = item["Image 2"] || "";
        document.querySelector('[name="image3"]').value = item["Image 3"] || "";
        document.querySelector('[name="image4"]').value = item["Image 4"] || "";
        document.querySelector('[name="image5"]').value = item["Image 5"] || "";
        document.querySelector('[name="image6"]').value = item["Image 6"] || "";
        els.details.value = item["Details"] || "";
        els.notes.value = item["Notes"] || "";

        els.originalItemNumberField.value = state.originalItemNumber;
        setMode("edit");
        setPill("Item loaded", "ok");
      } catch(e){
        console.error(e);
        setPill("Load error", "err");
      }
    }

    function newItem(){
      els.form.reset();
      state.originalItemNumber = "";
      state.loadedRowNumber = 0;
      els.originalItemNumberField.value = "";
      setMode("new");
      setPill("Ready", "ok");
      els.itemNumber.focus();
    }

    async function validateBeforeSave(){
      const id = els.itemNumber.value.trim().toUpperCase();
      els.itemNumber.value = id;
      const serial = els.serialNumber.value.trim();
      const params = { action:"validate", id, serial };
      if (state.mode === "edit" && state.loadedRowNumber) params.excludeRow = state.loadedRowNumber;

      const v = await apiGet(params);
      if (!v || !v.ok) throw new Error(v?.error || "Validate failed");
      if (v.duplicateId){ setPill("Duplicate Item Number", "err"); return false; }
      if (v.duplicateSerial){ setPill("Duplicate Serial", "warn"); return false; }
      return true;
    }

    // Form submits to iframe (no CORS). Apps Script replies with postMessage.
    els.form.action = APPS_SCRIPT_URL;

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || typeof data !== "object" || data.ok === undefined) return;

      if (data.ok){
        setPill(data.message || "Saved", "ok");
        if (data.itemNumber){
          els.lookupItemId.value = data.itemNumber;
          state.originalItemNumber = data.itemNumber;
          els.originalItemNumberField.value = data.itemNumber;
          setMode("edit");
        }
        if (state.saveAndNew){
          state.saveAndNew = false;
          newItem();
        }
      } else {
        if (data.duplicateId) setPill("Duplicate Item Number", "err");
        else if (data.duplicateSerial) setPill("Duplicate Serial", "warn");
        else setPill(data.error || "Save failed", "err");
      }
    });

    async function save(saveAndNew=false){
      state.saveAndNew = saveAndNew;

      const id = els.itemNumber.value.trim().toUpperCase();
      if (id){
        const re = /^TP-\d{6}-[A-Z]{4}$/;
        if (!re.test(id)){
          setPill("ID must be TP-MMDDYY-XXXX", "err");
          state.saveAndNew = false;
          return;
        }
      } else if (!els.title.value.trim()){
        setPill("Add Item Number or Title", "err");
        state.saveAndNew = false;
        return;
      }

      setPill("Checking duplicates…", "info");
      try{
        const ok = await validateBeforeSave();
        if (!ok){ state.saveAndNew = false; return; }
        setPill(state.mode==="edit" ? "Saving changes…" : "Saving…", "info");
        els.form.submit();
      } catch(e){
        console.error(e);
        setPill("Save error", "err");
        state.saveAndNew = false;
      }
    }

    // events
    document.getElementById("reloadDropdownsBtn").addEventListener("click", loadDropdowns);
    document.getElementById("genIdBtn").addEventListener("click", autoId);
    document.getElementById("loadItemBtn").addEventListener("click", loadItem);
    document.getElementById("newModeBtn").addEventListener("click", newItem);
    document.getElementById("saveNewBtn").addEventListener("click", () => save(true));
    els.form.addEventListener("submit", (e) => { e.preventDefault(); save(false); });

    // init
    setMode("new");
    loadDropdowns();
    setPill("Ready", "ok");
  </script>
</body>
</html>
