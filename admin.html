<!doctype html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tek-Pak Inventory Intake</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --line:#dfe5ef;
      --text:#111827;
      --muted:#6b7280;
      --brand:#84cc16;   /* lime green */
      --brand2:#2563eb;  /* medium blue */
      --danger:#dc2626;
      --ok:#16a34a;
      --shadow:0 12px 30px rgba(0,0,0,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:linear-gradient(180deg,#f8fafc,#eef3fb);
      color:var(--text);
    }

    .wrap{
      max-width:1100px;
      margin:24px auto;
      padding:0 16px;
    }

    .hero{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px 18px 14px;
      margin-bottom:16px;
    }

    .hero-top{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .badge{
      width:42px;
      height:42px;
      border-radius:12px;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
      flex:0 0 auto;
    }

    h1{
      font-size:1.15rem;
      margin:0;
      line-height:1.2;
    }

    .sub{
      margin:6px 0 0;
      color:var(--muted);
      font-size:.92rem;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .toolbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      background:#fbfdff;
      flex-wrap:wrap;
    }

    .toolbar .left{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      padding:6px 10px;
      border:1px solid var(--line);
      border-radius:999px;
      font-size:.82rem;
      color:#334155;
      background:#fff;
    }

    .search{
      min-width:220px;
      flex:1 1 260px;
      max-width:360px;
      position:relative;
    }

    .search input{
      width:100%;
      border:1px solid var(--line);
      border-radius:10px;
      padding:9px 12px;
      outline:none;
      background:#fff;
    }

    .search input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }

    form{
      padding:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .field.full{
      grid-column:1 / -1;
    }

    label{
      font-size:.86rem;
      font-weight:700;
      color:#1f2937;
    }

    .hint{
      font-size:.75rem;
      color:var(--muted);
      margin-top:-2px;
    }

    input, select, textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:.92rem;
      background:#fff;
      color:var(--text);
      outline:none;
      transition:.15s ease;
    }

    textarea{
      min-height:96px;
      resize:vertical;
    }

    input:focus, select:focus, textarea:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      margin-top:14px;
      border-top:1px solid var(--line);
      padding-top:14px;
      flex-wrap:wrap;
    }

    .btns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--brand),#65a30d);
      color:#111827;
    }

    .btn-primary:hover{ transform:translateY(-1px); }

    .btn-secondary{
      background:#fff;
      color:#111827;
      border:1px solid var(--line);
    }

    .btn-secondary:hover{ background:#f8fafc; }

    .status{
      font-size:.9rem;
      min-height:1.2em;
    }

    .status.ok{ color:var(--ok); }
    .status.err{ color:var(--danger); }
    .status.muted{ color:var(--muted); }

    .loading{
      opacity:.65;
      pointer-events:none;
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns:repeat(2, minmax(0,1fr)); }
    }

    @media (max-width: 620px){
      .grid{ grid-template-columns:1fr; }
      .search{ max-width:none; width:100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-top">
        <div class="badge" aria-hidden="true"></div>
        <div>
          <h1>Tek-Pak Inventory Intake</h1>
          <p class="sub" id="sheetLabel">Loading your sheet schema...</p>
        </div>
      </div>
    </div>

    <div class="card" id="appCard">
      <div class="toolbar">
        <div class="left">
          <span class="pill" id="fieldCountPill">Fields: --</span>
          <span class="pill" id="dropdownCountPill">Dropdowns: --</span>
        </div>
        <div class="search">
          <input id="fieldSearch" type="text" placeholder="Filter fields by header name..." />
        </div>
      </div>

      <form id="inventoryForm">
        <div class="grid" id="formGrid"></div>

        <div class="actions">
          <div class="btns">
            <button type="submit" class="btn-primary">Add Item</button>
            <button type="button" class="btn-secondary" id="clearBtn">Clear Form</button>
            <button type="button" class="btn-secondary" id="reloadBtn">Reload Headers</button>
          </div>
          <div class="status muted" id="status">Ready.</div>
        </div>
      </form>
    </div>
  </div>

  <script>
    const state = {
      schema: null,
      filteredFields: []
    };

    const el = {
      appCard: document.getElementById('appCard'),
      form: document.getElementById('inventoryForm'),
      formGrid: document.getElementById('formGrid'),
      status: document.getElementById('status'),
      sheetLabel: document.getElementById('sheetLabel'),
      fieldSearch: document.getElementById('fieldSearch'),
      clearBtn: document.getElementById('clearBtn'),
      reloadBtn: document.getElementById('reloadBtn'),
      fieldCountPill: document.getElementById('fieldCountPill'),
      dropdownCountPill: document.getElementById('dropdownCountPill')
    };

    function setStatus(msg, type = 'muted') {
      el.status.textContent = msg;
      el.status.className = 'status ' + type;
    }

    function setLoading(on) {
      el.appCard.classList.toggle('loading', !!on);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function isLikelyLongField(field) {
      if (field.isTextarea) return true;
      const n = field.label.toLowerCase();
      return ['description','notes','details','specs','comments'].some(k => n.includes(k));
    }

    function renderFields(fields) {
      const html = fields.map(field => {
        const full = isLikelyLongField(field) ? ' full' : '';
        const id = 'f_' + field.key.replace(/\W+/g, '_');

        const label = `
          <label for="${id}">${escapeHtml(field.label)}</label>
          ${field.options && field.options.length ? `<div class="hint">Dropdown from sheet validation</div>` : ''}
        `;

        let control = '';

        if (field.options && field.options.length) {
          const opts = ['<option value=""></option>']
            .concat(field.options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`))
            .join('');
          control = `<select id="${id}" name="${escapeHtml(field.key)}">${opts}</select>`;
        } else if (field.isTextarea) {
          control = `<textarea id="${id}" name="${escapeHtml(field.key)}" placeholder="${escapeHtml(field.label)}"></textarea>`;
        } else {
          const type = field.inputType || 'text';
          const step = type === 'number' ? ' step="any"' : '';
          control = `<input id="${id}" name="${escapeHtml(field.key)}" type="${type}"${step} placeholder="${escapeHtml(field.label)}" />`;
        }

        return `<div class="field${full}" data-label="${escapeHtml(field.label.toLowerCase())}">${label}${control}</div>`;
      }).join('');

      el.formGrid.innerHTML = html || `<div class="field full"><div class="hint">No fields match your filter.</div></div>`;
    }

    function updatePills() {
      const total = state.schema?.fields?.length || 0;
      const dd = (state.schema?.fields || []).filter(f => f.options && f.options.length).length;
      el.fieldCountPill.textContent = `Fields: ${total}`;
      el.dropdownCountPill.textContent = `Dropdowns: ${dd}`;
    }

    function applyFilter() {
      const q = el.fieldSearch.value.trim().toLowerCase();
      if (!state.schema) return;

      if (!q) {
        state.filteredFields = [...state.schema.fields];
      } else {
        state.filteredFields = state.schema.fields.filter(f =>
          f.label.toLowerCase().includes(q)
        );
      }
      renderFields(state.filteredFields);
    }

    function loadSchema() {
      setLoading(true);
      setStatus('Loading headers and dropdowns from your sheet...', 'muted');

      google.script.run
        .withSuccessHandler((schema) => {
          state.schema = schema;
          state.filteredFields = [...schema.fields];

          el.sheetLabel.textContent = `Connected to sheet tab: ${schema.sheetName}`;
          updatePills();
          renderFields(state.filteredFields);

          setLoading(false);
          setStatus('Ready.', 'ok');
        })
        .withFailureHandler((err) => {
          console.error(err);
          setLoading(false);
          setStatus('Could not load sheet schema: ' + (err.message || err), 'err');
        })
        .getFormSchema();
    }

    function clearForm() {
      const controls = el.form.querySelectorAll('input, select, textarea');
      controls.forEach(c => {
        if (c.type === 'checkbox' || c.type === 'radio') {
          c.checked = false;
        } else {
          c.value = '';
        }
      });
      setStatus('Form cleared.', 'muted');
    }

    function collectFormData() {
      const payload = {};
      const controls = el.form.querySelectorAll('[name]');
      controls.forEach(c => {
        let val = c.value;
        // Keep date values as text (YYYY-MM-DD) so sheet handles it predictably
        payload[c.name] = val;
      });
      return payload;
    }

    function submitForm(e) {
      e.preventDefault();
      if (!state.schema) return;

      const payload = collectFormData();

      setLoading(true);
      setStatus('Saving item to sheet...', 'muted');

      google.script.run
        .withSuccessHandler((res) => {
          setLoading(false);

          if (res && res.ok) {
            setStatus(`${res.message} (Row ${res.rowNumber})`, 'ok');
            clearForm();
          } else {
            setStatus((res && res.message) || 'Unknown error while saving.', 'err');
          }
        })
        .withFailureHandler((err) => {
          console.error(err);
          setLoading(false);
          setStatus('Save failed: ' + (err.message || err), 'err');
        })
        .submitInventoryItem(payload);
    }

    // Events
    el.form.addEventListener('submit', submitForm);
    el.clearBtn.addEventListener('click', clearForm);
    el.reloadBtn.addEventListener('click', loadSchema);
    el.fieldSearch.addEventListener('input', applyFilter);

    // Init
    loadSchema();
  </script>
</body>
</html>
